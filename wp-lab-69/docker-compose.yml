services:
  db:
    image: mariadb:10.11
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal-only
    # sin "ports:" -> no expuesto al host

  wordpress:
    image: wordpress:${WP_VERSION}
    restart: "no"
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DEBUG: 1
    volumes:
      - wp_data:/var/www/html
    ports:
      - "127.0.0.1:${HOST_PORT}:80"   # bind SOLO a loopback, nunca 0.0.0.0
    networks:
      - internal-only

volumes:
  db_data:
  wp_data:

networks:
  internal-only:
    driver: bridge
    internal: false   # NO pasar a true: rompe la publicación de puertos al host (docker no puede
                      # hacer port-forward hacia una red sin gateway). El aislamiento real ya lo da
                      # el bind a 127.0.0.1 de más abajo.
